spring.application.name=demo
spring.datasource.url=jdbc:postgresql://localhost:5432/${API_DB}

spring.datasource.username=${API_DB_USER}
spring.datasource.password=${API_DB_PASSWORD}

spring.flyway.baseline-on-migrate=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.boot.diagnostics=ERROR
logging.exception-conversion-word=%wEx{short}
spring.output.ansi.enabled=ALWAYS

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true