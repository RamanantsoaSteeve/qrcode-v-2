spring.application.name=demo
spring.datasource.url=jdbc:postgresql://localhost:5432/${API_DB}

spring.datasource.username=${API_DB_USER}
spring.datasource.password=${API_DB_PASSWORD}

spring.flyway.baseline-on-migrate=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.boot.diagnostics=ERROR
logging.exception-conversion-word=%wEx{short}
spring.output.ansi.enabled=ALWAYS

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Afficher le message précis de l'exception dans la réponse JSON
server.error.include-message=always
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
# Afficher les erreurs de validation (ex: @NotNull, @Size)
server.error.include-binding-errors=always

# Carrément inclure la stacktrace (la pile d'exécution) dans le JSON (Optionnel mais très précis)
server.error.include-stacktrace=always

app.security.keystore-path=classpath:keystore.p12
app.security.keystore-password=${PASSWORD_KEYSTORE}
app.security.key-alias=${ALIAS_KEY}