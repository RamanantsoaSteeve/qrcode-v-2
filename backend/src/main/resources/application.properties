spring.application.name=demo
# URL de connexion (remplace 'ma_base' par le nom de ta base de données)
spring.datasource.url=jdbc:postgresql://localhost:5432/steve

# Tes identifiants PostgreSQL
spring.datasource.username=steve
spring.datasource.password=Steve1234!


spring.flyway.baseline-on-migrate=true
# Driver et Hibernate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
