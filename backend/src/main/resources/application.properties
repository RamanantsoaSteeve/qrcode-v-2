spring.application.name=demo
# URL de connexion (remplace 'ma_base' par le nom de ta base de données)
spring.datasource.url=jdbc:postgresql://localhost:5432/${API_DB}

# Tes identifiants PostgreSQL
spring.datasource.username=${API_DB_USER}
spring.datasource.password=${API_DB_PASSWORD}

spring.flyway.baseline-on-migrate=true
# Driver et Hibernate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.boot.diagnostics=ERROR
logging.exception-conversion-word=%wEx{short}
spring.output.ansi.enabled=ALWAYS