<router-outlet></router-outlet>

<!-- SÉLECTEUR DE LANGUE : STYLE BARRE DE NAVIGATION MINIMALE -->
<div class="fixed top-6 right-6 z-50">
  <div
    class="flex items-center p-1 bg-white/40 backdrop-blur-md border border-zinc-200 rounded-full shadow-sm"
  >
    <!-- Bouton Français -->
    <button
      (click)="switchLang('fr')"
      class="px-4 py-1.5 rounded-full text-[11px] font-black tracking-widest transition-all duration-500"
      [class.bg-zinc-900]="activeLang === 'fr'"
      [class.text-white]="activeLang === 'fr'"
      [class.text-zinc-400]="activeLang !== 'fr'"
    >
      FR
    </button>

    <!-- Bouton Malagasy -->
    <button
      (click)="switchLang('mg')"
      class="px-4 py-1.5 rounded-full text-[11px] font-black tracking-widest transition-all duration-500"
      [class.bg-zinc-900]="activeLang === 'mg'"
      [class.text-white]="activeLang === 'mg'"
      [class.text-zinc-400]="activeLang !== 'mg'"
    >
      MG
    </button>

    <!-- Bouton English -->
    <button
      (click)="switchLang('en')"
      class="px-4 py-1.5 rounded-full text-[11px] font-black tracking-widest transition-all duration-500"
      [class.bg-zinc-900]="activeLang === 'en'"
      [class.text-white]="activeLang === 'en'"
      [class.text-zinc-400]="activeLang !== 'en'"
    >
      EN
    </button>
  </div>
</div>
<!-- DÉCONNEXION : STYLE ORIGINAL - POSITION BAS DROITE -->
@if (authService.isConnected()) {
  <div class="fixed bottom-6 right-6 z-50 group">
    <button
      *transloco="let t"
      (click)="isDeconnect()"
      class="flex flex-row-reverse items-center gap-0 bg-white border border-zinc-200 p-1.5 rounded-full shadow-lg transition-all duration-500 hover:gap-4 hover:pl-6 hover:bg-red-50 hover:border-red-200 group"
    >
      <!-- L'icône seule est visible par défaut -->
      <div
        class="w-10 h-10 flex items-center justify-center bg-zinc-100 rounded-full text-zinc-500 transition-all duration-500 group-hover:bg-red-600 group-hover:text-white group-hover:rotate-12"
      >
        <svg
          xmlns="http://www.w3.org"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          />
        </svg>
      </div>

      <!-- Le texte se déploie maintenant vers la GAUCHE -->
      <span
        class="max-w-0 overflow-hidden opacity-0 text-[10px] font-black uppercase tracking-[0.2em] text-red-600 transition-all duration-500 group-hover:max-w-[150px] group-hover:opacity-100 whitespace-nowrap"
      >
        {{ t('DECONNECT') }}
      </span>
    </button>
  </div>
}
